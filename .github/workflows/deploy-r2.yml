name: Deploy to Cloudflare R2

on:
  workflow_call:
    inputs:
      artifact-name:
        description: Name of the artifact containing the files to upload
        required: true
        type: string
      file-prefix:
        description: "Filename prefix for the APK (e.g. com.mobilerun.portal or mobilerun-portal-internal)"
        required: true
        type: string
      tag:
        description: Version tag used in the filename
        required: true
        type: string
      r2-destination-prefix:
        description: "Path prefix inside the R2 bucket (e.g. portal)"
        required: false
        type: string
        default: portal
      environments:
        description: 'JSON array of {environment} objects'
        required: false
        type: string
        default: '[{"environment":"dev"},{"environment":"staging"},{"environment":"prod"}]'
      public-base-url:
        description: Public base URL for release feed APK URLs
        required: false
        type: string
        default: https://releases.mobilerun.ai
    secrets:
      R2_ACCESS_KEY_ID:
        required: true
      R2_SECRET_ACCESS_KEY:
        required: true
      R2_ACCOUNT_ID:
        required: true
      R2_BUCKET:
        required: true
      PUBLIC_R2_ACCESS_KEY_ID:
        required: true
      PUBLIC_R2_SECRET_ACCESS_KEY:
        required: true
      PUBLIC_R2_ACCOUNT_ID:
        required: true
      PUBLIC_R2_BUCKET:
        required: true

jobs:
  deploy-r2:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(inputs.environments) }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Upload to Cloudflare R2 (${{ matrix.environment }})
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          set -euo pipefail

          FILE="${{ inputs.file-prefix }}-${{ inputs.tag }}.apk"
          SOURCE_FILE="$(find . -maxdepth 1 -name "${FILE}" | head -n1)"
          BUCKET="${{ secrets.R2_BUCKET }}"
          DEST="${{ matrix.environment }}/${{ inputs.r2-destination-prefix }}/${FILE}"

          [[ -n "${SOURCE_FILE}" ]]
          SOURCE_FILE="${SOURCE_FILE#./}"

          aws s3 cp "${SOURCE_FILE}" "s3://${BUCKET}/${DEST}" --endpoint-url "${R2_ENDPOINT}"
          echo "Uploaded ${SOURCE_FILE} to ${BUCKET}/${DEST}"

  publish-update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}

      - name: Publish update feed
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.PUBLIC_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.PUBLIC_R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.PUBLIC_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          PUBLIC_R2_BUCKET: ${{ secrets.PUBLIC_R2_BUCKET }}
        run: |
          set -euo pipefail

          FILE="${{ inputs.file-prefix }}-${{ inputs.tag }}.apk"
          SOURCE_FILE="$(find . -maxdepth 1 -name "${FILE}" | head -n1)"
          BUCKET="${PUBLIC_R2_BUCKET}"
          FEED_DIR="${{ inputs.r2-destination-prefix }}/${{ inputs.file-prefix }}"
          FEED_APK_DEST="${FEED_DIR}/${FILE}"
          APK_URL="${{ inputs.public-base-url }}/${FEED_APK_DEST}"

          [[ -n "${SOURCE_FILE}" ]]
          SOURCE_FILE="${SOURCE_FILE#./}"

          SHA256="$(sha256sum "${SOURCE_FILE}" | awk '{print $1}')"
          cat > latest.json <<EOF
          {
            "version": "${{ inputs.tag }}",
            "versionCode": ${{ github.run_number }},
            "packageName": "${{ inputs.file-prefix }}",
            "apkUrl": "${APK_URL}",
            "sha256": "${SHA256}"
          }
          EOF

          aws s3 cp "${SOURCE_FILE}" "s3://${BUCKET}/${FEED_APK_DEST}" --endpoint-url "${R2_ENDPOINT}"
          aws s3 cp latest.json "s3://${BUCKET}/${FEED_DIR}/latest.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/json"
          echo "Published update feed to ${BUCKET}/${FEED_DIR}/latest.json"
